<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="200" height="200" fill="#0A0F0D" rx="12"/>
  <!-- Hexagon shape -->
  <polygon points="100,12 172,53 172,147 100,188 28,147 28,53"
           fill="none" stroke="#39ff8e" stroke-width="3" filter="url(#glow)"/>
  <!-- Inner glow ring -->
  <polygon points="100,20 164,57 164,143 100,180 36,143 36,57"
           fill="none" stroke="#39ff8e" stroke-width="1" opacity="0.3"/>
  <!-- Agent identity icon: stylised face/agent mark -->
  <!-- Outer circuit dots -->
  <circle cx="100" cy="70" r="5" fill="#39ff8e" filter="url(#glow)"/>
  <circle cx="70" cy="105" r="3" fill="#39ff8e" opacity="0.6"/>
  <circle cx="130" cy="105" r="3" fill="#39ff8e" opacity="0.6"/>
  <!-- MX-8004 id badge lines -->
  <line x1="70" y1="88" x2="130" y2="88" stroke="#39ff8e" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="80" y1="105" x2="120" y2="105" stroke="#39ff8e" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="88" y1="120" x2="112" y2="120" stroke="#39ff8e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- = / glyph (small, bottom) -->
  <text x="100" y="148" fill="#39ff8e" font-family="monospace" font-size="14" text-anchor="middle" opacity="0.8">MX-8004</text>
</svg>
